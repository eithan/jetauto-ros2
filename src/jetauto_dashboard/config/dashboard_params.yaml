dashboard_node:
  ros__parameters:
    port: 5000
    host: "0.0.0.0"
    robot_name: "JARVIS"
    # How often to read CPU/GPU temps and battery from sysfs (seconds)
    # Reads once immediately at startup, then every interval
    system_monitor_interval: 180.0
    # Command to run when shutdown is confirmed from the UI
    # Requires passwordless sudo for the ubuntu user (default on Jetson)
    shutdown_command: "sudo /sbin/poweroff"
