# Nav2 parameters tuned for JetAuto house navigation
# Mecanum drive (omnidirectional), SLAMTEC A1 lidar, Orbbec depth camera
# Orin Nano 8GB — conservative on memory, generous on compute

# ─── AMCL (Localization — used after map is saved) ───
amcl:
  ros__parameters:
    use_sim_time: false
    alpha1: 0.2     # rotation noise from rotation (mecanum = moderate)
    alpha2: 0.2     # rotation noise from translation
    alpha3: 0.2     # translation noise from translation
    alpha4: 0.2     # translation noise from rotation
    alpha5: 0.2     # translation noise (omnidirectional component)
    base_frame_id: base_footprint
    global_frame_id: map
    odom_frame_id: odom
    robot_model_type: omnidirectional  # mecanum = omnidirectional
    scan_topic: /scan
    laser_model_type: likelihood_field
    max_beams: 60
    max_particles: 2000
    min_particles: 500
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_fast: 0.1
    recovery_alpha_slow: 0.001
    resample_interval: 1
    tf_broadcast: true
    transform_tolerance: 0.5
    update_min_a: 0.1       # radians — trigger update on small rotations
    update_min_d: 0.1       # meters — trigger update on small movements
    z_hit: 0.95
    z_max: 0.05
    z_rand: 0.05
    z_short: 0.1
    sigma_hit: 0.2
    set_initial_pose: true
    initial_pose:
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: 0.0

# ─── BT Navigator ───
bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odom
    bt_loop_duration: 50            # 50ms (was 10ms — way too fast for Orin Nano)
    default_server_timeout: 20
    navigators: ['navigate_to_pose', 'navigate_through_poses']
    navigate_to_pose:
      plugin: nav2_bt_navigator::NavigateToPoseNavigator
    navigate_through_poses:
      plugin: nav2_bt_navigator::NavigateThroughPosesNavigator

# ─── Controller Server (local trajectory tracking) ───
controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 10.0        # 10Hz is plenty for indoor
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001   # mecanum can strafe
    min_theta_velocity_threshold: 0.001
    progress_checker_plugins: ['progress_checker']
    goal_checker_plugins: ['general_goal_checker']
    controller_plugins: ['FollowPath']

    progress_checker:
      plugin: nav2_controller::SimpleProgressChecker
      required_movement_radius: 0.3
      movement_time_allowance: 10.0

    general_goal_checker:
      plugin: nav2_controller::SimpleGoalChecker
      xy_goal_tolerance: 0.15         # 15cm tolerance (fine for rooms)
      yaw_goal_tolerance: 0.25        # ~14° tolerance
      stateful: true

    # DWB controller — good for omnidirectional
    FollowPath:
      plugin: dwb_core::DWBLocalPlanner
      debug_trajectory_details: false
      min_vel_x: -0.1                 # allow small reverse
      max_vel_x: 0.3                  # conservative indoor speed
      min_vel_y: -0.2                 # mecanum strafe
      max_vel_y: 0.2
      max_vel_theta: 0.8              # rad/s rotation limit
      min_speed_xy: 0.0
      max_speed_xy: 0.3
      min_speed_theta: 0.0
      acc_lim_x: 1.5
      acc_lim_y: 1.5                  # mecanum lateral accel
      acc_lim_theta: 2.0
      decel_lim_x: -1.5
      decel_lim_y: -1.5
      decel_lim_theta: -2.0
      vx_samples: 15
      vy_samples: 10                  # sample lateral velocities too
      vtheta_samples: 20
      sim_time: 1.5
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.3
      xy_goal_tolerance: 0.15
      trans_stopped_velocity: 0.15
      short_circuit_trajectory_evaluation: true
      stateful: true
      critics: ['RotateToGoal', 'Oscillation', 'BaseObstacle', 'GoalAlign', 'PathAlign', 'PathDist', 'GoalDist']
      BaseObstacle.scale: 0.02
      PathAlign.scale: 32.0
      PathAlign.forward_point_distance: 0.1
      GoalAlign.scale: 24.0
      GoalAlign.forward_point_distance: 0.1
      PathDist.scale: 32.0
      GoalDist.scale: 24.0
      RotateToGoal.scale: 32.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0

# ─── Planner Server (global path planning) ───
planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 5.0
    planner_plugins: ['GridBased']
    GridBased:
      plugin: nav2_navfn_planner/NavfnPlanner
      tolerance: 0.3
      use_astar: true                 # A* is better than Dijkstra for point-to-point
      allow_unknown: true             # allow planning through unexplored space

# ─── Smoother ───
smoother_server:
  ros__parameters:
    use_sim_time: false
    smoother_plugins: ['simple_smoother']
    simple_smoother:
      plugin: nav2_smoother::SimpleSmoother
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

# ─── Behavior Server (recoveries) ───
behavior_server:
  ros__parameters:
    use_sim_time: false
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ['spin', 'backup', 'drive_on_heading', 'wait']
    spin:
      plugin: nav2_behaviors/Spin
    backup:
      plugin: nav2_behaviors/BackUp
    drive_on_heading:
      plugin: nav2_behaviors/DriveOnHeading
    wait:
      plugin: nav2_behaviors/Wait

# ─── Global Costmap ───
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 2.0           # 2Hz (save CPU — global doesn't need to be fast)
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_footprint
      # JetAuto footprint: ~28cm x 25cm (rectangular + some padding)
      footprint: '[[0.17, 0.15], [0.17, -0.15], [-0.17, -0.15], [-0.17, 0.15]]'
      resolution: 0.05
      track_unknown_space: true
      # Rolling window: costmap follows the robot, never "out of bounds"
      # 20m x 20m is plenty for house-scale exploration
      rolling_window: true
      width: 20
      height: 20
      plugins: ['scan_obstacle_layer', 'depth_obstacle_layer', 'virtual_obstacle_layer', 'inflation_layer']
      # Separate layers: lidar clearing can't erase depth camera or virtual obstacles
      scan_obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: LaserScan
          raytrace_max_range: 8.0
          raytrace_min_range: 0.0
          obstacle_max_range: 6.0
          obstacle_min_range: 0.0
      depth_obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        observation_sources: depth
        depth:
          topic: /depth_cam/depth/points
          data_type: PointCloud2
          max_obstacle_height: 0.80   # beds, chairs, tables
          min_obstacle_height: 0.03   # ignore floor noise
          obstacle_max_range: 3.0
          obstacle_min_range: 0.2
          raytrace_max_range: 3.5
          raytrace_min_range: 0.2
          clearing: false             # depth obstacles PERSIST — lidar can't erase them
          marking: true
          sensor_frame: depth_cam_link
      # Virtual obstacles injected when stuck is detected — teaches Nav2 about
      # invisible obstacles (beds, low tables) that neither lidar nor camera caught
      virtual_obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        observation_sources: virtual
        virtual:
          topic: /virtual_obstacles
          data_type: PointCloud2
          max_obstacle_height: 1.0
          min_obstacle_height: 0.01
          obstacle_max_range: 25.0    # large range — these are in map frame
          obstacle_min_range: 0.0
          raytrace_max_range: 0.0     # no raytracing — don't clear anything
          raytrace_min_range: 0.0
          clearing: false             # NEVER clear — these are learned obstacles
          marking: true
          sensor_frame: map           # points are already in map frame
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        cost_scaling_factor: 3.0
        inflation_radius: 0.50

# ─── Local Costmap ───
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 5.0           # 5Hz — need reactivity for local obstacles
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_footprint
      footprint: '[[0.17, 0.15], [0.17, -0.15], [-0.17, -0.15], [-0.17, 0.15]]'
      rolling_window: true
      width: 3                        # 3m x 3m local window
      height: 3
      resolution: 0.05
      plugins: ['scan_obstacle_layer', 'depth_obstacle_layer', 'virtual_obstacle_layer', 'inflation_layer']
      scan_obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: LaserScan
          raytrace_max_range: 8.0
          raytrace_min_range: 0.0
          obstacle_max_range: 6.0
          obstacle_min_range: 0.0
      depth_obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        observation_sources: depth
        depth:
          topic: /depth_cam/depth/points
          data_type: PointCloud2
          max_obstacle_height: 0.80
          min_obstacle_height: 0.03
          obstacle_max_range: 3.0
          obstacle_min_range: 0.2
          raytrace_max_range: 3.5
          raytrace_min_range: 0.2
          clearing: false             # depth obstacles persist
          marking: true
          sensor_frame: depth_cam_link
      # Same virtual obstacle layer in local costmap — DWB needs to see these too
      virtual_obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        observation_sources: virtual
        virtual:
          topic: /virtual_obstacles
          data_type: PointCloud2
          max_obstacle_height: 1.0
          min_obstacle_height: 0.01
          obstacle_max_range: 25.0
          obstacle_min_range: 0.0
          raytrace_max_range: 0.0
          raytrace_min_range: 0.0
          clearing: false
          marking: true
          sensor_frame: map
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        cost_scaling_factor: 3.0
        inflation_radius: 0.50

# ─── Velocity Smoother ───
velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: OPEN_LOOP
    max_velocity: [0.3, 0.2, 0.8]          # [x, y, theta]
    min_velocity: [-0.1, -0.2, -0.8]
    max_accel: [1.5, 1.5, 2.0]
    max_decel: [-1.5, -1.5, -2.0]
    odom_topic: /odom
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]

# ─── Waypoint Follower ───
waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: wait_at_waypoint
    wait_at_waypoint:
      plugin: nav2_waypoint_follower::WaitAtWaypoint
      enabled: true
      waypoint_pause_duration: 200    # ms pause at each waypoint

# ─── Lifecycle Manager ───
map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: ''                 # set at launch time
